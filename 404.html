<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina niet gevonden | Equiprovet</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .error-page { min-height: 100vh; background: var(--ink); display: flex; align-items: center; justify-content: center; text-align: center; }
    .error-num { font-family: 'Open Sans', sans-serif; font-size: clamp(120px, 20vw, 220px); font-weight: 900; color: rgba(21,96,189,0.15); line-height: 1; letter-spacing: -0.05em; }
    .error-title { font-family: 'Open Sans', sans-serif; font-size: clamp(24px, 4vw, 40px); font-weight: 800; color: #fff; margin: -20px 0 16px; }
    .error-desc { font-size: 16px; color: rgba(255,255,255,0.55); margin-bottom: 40px; max-width: 420px; line-height: 1.7; }
    .error-links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    nav { position: fixed; top: 0; left: 0; right: 0; padding: 0 48px; height: 72px; display: flex; align-items: center; background: rgba(13,17,23,.94); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(21,96,189,.2); z-index: 100; }
  </style>
</head>
<body>
<nav>
  <a href="/" style="display:flex;align-items:center;text-decoration:none;">
    <img src="/images/logo.png" alt="Equiprovet" style="height:46px;width:auto;">
  </a>
</nav>
<div class="error-page">
  <div>
    <div class="error-num">404</div>
    <h1 class="error-title">Pagina niet gevonden</h1>
    <p class="error-desc">Deze pagina bestaat niet (meer). Gebruik de links hieronder om terug te gaan.</p>
    <div class="error-links">
      <a href="/" class="btn-primary">← Terug naar home</a>
      <a href="/producten.html" class="btn-secondary">Bekijk producten</a>
      <a href="/contact.html" class="btn-secondary">Contact</a>
    </div>
  </div>
</div>
</body>
</html>
